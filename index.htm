<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Session</title>
  <style>
    body {font-family: Arial; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f5f5;}
    h2 {text-align: center; color: #2c3e50;}
    input, button {width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;}
    button {background: #25D366; color: white; border: none; font-size: 16px; font-weight: bold;}
    button:active {background: #1ebe5b;}
  </style>
</head>
<body>
  <h2>Book Your Session</h2>
  <form action="https://formsubmit.co/bruv93586@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="New Booking - Bruv Councilor">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_autoresponse" value="Hi {Name}! Your session with Bruv Councilor is confirmed for {Date} at {Time}. See you then!">
    <input type="hidden" name="_next" value="https://wa.me/254XXXXXXXXX?text=Hi%20Bruv%20Councilor%2C%20I%20just%20booked%20for%20{Date}%20at%20{Time}.%20Please%20confirm.">
    
    <input type="text" name="Name" placeholder="Full Name" required>
    <input type="tel" name="Phone" placeholder="WhatsApp Number with 254..." required>
    <input type="date" name="Date" required>
    <input type="time" name="Time" required>
    
    <button type="submit">Book Now</button>
  </form>
</body>
</html>
